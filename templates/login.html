{% extends "layout.html" %}

{% block content %}

<div class="form-box">
    <h2>會員登入</h2>
    <p class="hint">可使用 Email 或手機號碼登入</p>

    <form method="POST">
        <input name="account" placeholder="Email 或手機號碼">
        <input name="password" type="password" placeholder="密碼">

        <button>登入</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <p class="link-text">
        還沒有帳號？<a href="/register">立即註冊</a>
    </p>
</div>

{% endblock %}
