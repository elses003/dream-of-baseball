<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>棒球</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="navbar">
    <div class="brand">
        <div class="logo-circle">
             <img src="{{ url_for('static', filename='baseball.png') }}" alt="logo">
             <h1>棒球夢</h1>
        </div>
        
    </div>

    <nav>
        <a href="/">首頁</a>
        <a href="/fields">球場</a>
        <a href="/practices">練球幫</a>
        <a href="#">找球隊</a>
        <a href="/add_product">裝備</a>

        {% if current_user.is_authenticated %}
            <a href="/dashboard">會員中心</a>
            <a href="/logout">登出</a>
        {% else %}
            <a href="/login">會員登入</a>
        {% endif %}
    </nav>
</header>

<main class="main">
    {% block content %}{% endblock %}
</main>

<footer class="footer">
</footer>

</body>
</html>
